# Local preprocessing configuration for synthetic data (smoke test)
# Uses the smoke_full_pipeline raw data from EpiSim.jl
#
# Based on preprocess_mn5_synth.yaml but with local paths.

# All synthetic data comes from the single bundled zarr
data_dir: "data/files"
synthetic_path: "../EpiSim.jl/runs/smoke_full_pipeline/raw_synthetic_observations.zarr"
# Individual paths are not used when synthetic_path is set, but required by config
cases_file: "../EpiSim.jl/runs/smoke_full_pipeline/raw_synthetic_observations.zarr"
mobility_path: "../EpiSim.jl/runs/smoke_full_pipeline/raw_synthetic_observations.zarr"
wastewater_file: "../EpiSim.jl/runs/smoke_full_pipeline/raw_synthetic_observations.zarr"
population_file: "../EpiSim.jl/runs/smoke_full_pipeline/raw_synthetic_observations.zarr"
region_metadata_file: "data/files/edar_muni_edges.nc"

# Temporal processing parameters - match synthetic data range
start_date: "2020-02-09"
end_date: "2020-06-01"

# Feature processing options
# IMPORTANT: Synthetic data MUST use concentration mode
wastewater_flow_mode: "concentration"

# Region filtering
min_density_threshold: 0.01 # Low threshold for synthetic data

# Output configuration
output_path: "data/processed"
dataset_name: "synthetic_full"
compression: "blosc"

# Alignment and validation options
alignment_strategy: "interpolate"
target_dataset: "cases"
crop_datasets: true
validate_alignment: true
generate_alignment_report: true

# Processing configuration
num_workers: 1
chunk_size: 365
run_id_chunk_size: 1
date_chunk_size: 30
mobility_chunk_size: 100
memory_limit_gb: 100.0

# Temporal covariates - must match real data preprocessing for curriculum training
temporal_covariates:
  include_day_of_week: true
  include_holidays: true
  include_lockdown_severity: true
  holiday_calendar_file: data/files/catalonia_holidays.csv

# Graph construction options
graph_options:
  edge_strategy: "knn"
  k_neighbors: 8
  distance_threshold: 50.0
  include_self_loops: false

# Validation and quality control options
validation_options:
  max_missing_percentage: 0.5
  min_data_coverage: 0.5
  outlier_detection: false
  outlier_threshold: 3.0
  temporal_consistency_check: true
  spatial_consistency_check: true
  generate_plots: false
