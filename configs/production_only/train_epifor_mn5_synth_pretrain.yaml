env: "mn5"

# Production synthetic pretraining config.
# Mirrors the MN5 full training template but targets the processed synthetic
# dataset and enables direct latent SIRD supervision for stage-1 pretraining.
# Stage-2 fine-tuning should use train_epifor_mn5_full.yaml with
# training.init_checkpoint_path set to the best checkpoint from this run.

data:
  dataset_path: data/processed/synthetic_full_holt_damped.zarr
  region2vec_path: outputs/region_embeddings/region_embeddings.pt
  use_valid_targets: true
  mobility_threshold: 10
  missing_permit:
    input:
      biomarkers_joint: 53
      cases: 20
      hospitalizations: 53
      deaths: 20
    horizon:
      biomarkers_joint: 26
      cases: 10
      hospitalizations: 26
      deaths: 10
  window_stride: 7
  sample_ordering: "time"
  run_id_chunk_size: 1

model:
  strict: false
  type:
    cases: true
    regions: true
    biomarkers: true
    mobility: true
  params:
    mobility_embedding_dim: 32
    region_embedding_dim: 64
    gnn_module: "gcn"
    include_day_of_week: true
    include_holidays: true
    include_lockdown_severity: true
    input_window_length: 60
    forecast_horizon: 28
    max_neighbors: 20
    gnn_depth: 2
    sir_physics:
      dt: 1.0
      enforce_nonnegativity: true
      enforce_mass_conservation: true
      beta_min: 0.01
      beta_max: 2.0
      gamma_min: 0.05
      gamma_max: 0.5
      mortality_min: 0.0001
      mortality_max: 0.05
      residual_clip: 10000.0
    observation_heads:
      delta_forecasting: true

output:
  experiment_name: mn5_epiforecaster_synth_pretrain
  log_dir: outputs/training
  wandb_mode: offline
  wandb_tags: [mn5, synth, pretrain]

training:
  compile: true
  compile_mode: "reduce-overhead"
  compile_dynamic: false
  compile_fullgraph: false
  compile_backward: true
  seed: 42
  device: "cuda"
  init_checkpoint_path: null
  batch_size: 32
  shuffle_train_batches: true
  gradient_accumulation_steps: 1
  gradient_clip_value: 5.0
  early_stopping_patience: 5
  nan_loss_patience: 5
  epochs: 50
  learning_rate: 0.001
  weight_decay: 1.0e-05
  warmup_steps: 100
  num_workers: 4
  val_workers: 2
  prefetch_factor: 2
  pin_memory: true

  progress_log_frequency: 100

  grad_norm_log_frequency: 500
  gradient_snapshot_frequency: 0
  gradient_snapshot_top_k: 5
  gradient_vanishing_threshold: 1.0e-8
  gradient_exploding_threshold: 1.0e2

  split_strategy: "node"

  val_split: 0.2
  test_split: 0.1

  profiler:
    enabled: true
    wait_steps: 5
    warmup_steps: 1
    active_steps: 2
    profile_epochs: [1]
    record_memory: false
    log_dir: auto
  plot_forecasts: true
  num_forecast_samples: 3
  loss:
    name: "joint_inference"
    joint:
      observation_loss: mae
      w_sird_supervision: 0.01

  curriculum:
    enabled: true
    active_runs: -1          # Use all available synthetic runs each epoch
    chunk_size: 512
    run_sampling: "round_robin"
    schedule:
      - start_epoch: 0
        end_epoch: 50        # Must match training.epochs
        synth_ratio: 1.0     # All synthetic, no real data
