env: "mn5"

data:
  dataset_path: data/processed/real_with_id.zarr
  region2vec_path: outputs/region_embeddings/region_embeddings.pt
  use_valid_targets: true
  mobility_threshold: 10
  missing_permit:
    input:
      biomarkers_joint: 53
      cases: 20
      hospitalizations: 53
      deaths: 20
    horizon:
      biomarkers_joint: 26
      cases: 10
      hospitalizations: 26
      deaths: 10
  window_stride: 1
  sample_ordering: "time"

model:
  type:
    cases: true
    regions: true
    biomarkers: true
    mobility: true
  mobility_embedding_dim: 16
  region_embedding_dim: 64
  input_window_length: 60
  forecast_horizon: 28
  max_neighbors: 20
  gnn_depth: 2
  gnn_hidden_dim: 32
  use_population: true
  population_dim: 1
  include_day_of_week: true
  include_holidays: true
  include_lockdown_severity: true
  include_vaccination: true
  gnn_module: "gcn"
  forecaster_head: "transformer"
  strict: false
  head_d_model: 64
  head_n_heads: 4
  head_num_layers: 2
  head_dropout: 0.1
  head_positional_encoding: "sinusoidal"
  sir_physics:
    dt: 1.0
    enforce_nonnegativity: true
    enforce_mass_conservation: true
    beta_min: 0.01
    beta_max: 2.0
    gamma_min: 0.05
    gamma_max: 0.5
    mortality_min: 0.0001
    mortality_max: 0.05
    residual_clip: 10000.0
  observation_heads:
    obs_context_dim: 64
    delta_forecasting: true

output:
  experiment_name: mn5_real_balanced
  log_dir: outputs/training
  wandb_mode: offline
  wandb_tags: [mn5, real-only, balanced]
  write_granular_eval: true
  granular_eval_filename: "{split}_granular.csv"

training:
  compile: true
  compile_mode: "reduce-overhead"
  compile_dynamic: false
  compile_fullgraph: false
  compile_backward: true
  seed: 42
  device: "cuda"
  init_checkpoint_path: null
  batch_size: 32
  shuffle_train_batches: true
  gradient_accumulation_steps: 1
  gradient_clip_value: 5.0
  early_stopping_patience: 8
  nan_loss_patience: 5
  epochs: 50
  learning_rate: 0.001
  weight_decay: 1.0e-05
  warmup_steps: 100
  num_workers: 4
  val_workers: 2
  test_workers: 0
  prefetch_factor: 2
  pin_memory: true
  progress_log_frequency: 100
  grad_norm_log_frequency: 500
  gradient_snapshot_frequency: 0
  gradient_snapshot_top_k: 5
  gradient_vanishing_threshold: 1.0e-8
  gradient_exploding_threshold: 1.0e2
  split_strategy: "node"
  node_split_strategy: "stratified"
  node_split_population_bins: 5
  val_split: 0.2
  test_split: 0.1
  profiler:
    enabled: true
    wait_steps: 5
    warmup_steps: 1
    active_steps: 2
    profile_epochs: [1]
    record_memory: false
    log_dir: auto
  plot_forecasts: true
  num_forecast_samples: 3
  loss:
    name: "joint_inference"
    joint:
      adaptive_scheme: "none"
      gradnorm_obs_weight_sum: 0.95
      gradnorm_update_every: 16
      gradnorm_ema_decay: 0.9
      gradnorm_probe: "obs_context"
      w_sird_supervision: 0.0
