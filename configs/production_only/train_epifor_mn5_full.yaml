env: "mn5"

data:
  dataset_path: data/processed/real_with_id.zarr
  region2vec_path: outputs/region_embeddings/region_embeddings.pt
  use_valid_targets: true
  mobility_threshold: 10
  missing_permit:
    input:
      biomarkers_joint: 53
      cases: 20
      hospitalizations: 53
      deaths: 20
    horizon:
      biomarkers_joint: 26
      cases: 10
      hospitalizations: 26
      deaths: 10
  window_stride: 7
  sample_ordering: "time"
  log_scale: true
model:
  strict: false
  type:
    cases: true
    regions: true
    biomarkers: true
    mobility: true
  params:
    mobility_embedding_dim: 32
    region_embedding_dim: 64
    gnn_module: "gcn"
    #-- seq sizes --#
    input_window_length: 60
    forecast_horizon: 28
    #-- graph params --#
    max_neighbors: 20
    gnn_depth: 2
    #-- SIR physics bounds (prevent gradient explosion) --#
    sir_physics:
      dt: 1.0
      enforce_nonnegativity: true
      enforce_mass_conservation: true
      beta_min: 0.01
      beta_max: 2.0
      gamma_min: 0.05
      gamma_max: 0.5
      mortality_min: 0.0001
      mortality_max: 0.05
      residual_clip: 10000.0
output:
  experiment_name: mn5_epiforecaster
  log_dir: outputs/training
  wandb_mode: offline
  wandb_tags: [mn5]
training:
  compile: true
  compile_mode: "reduce-overhead"
  compile_dynamic: false
  compile_fullgraph: false
  compile_backward: true
  seed: 42
  device: "cuda"
  batch_size: 32
  shuffle_train_batches: true
  gradient_accumulation_steps: 1
  gradient_clip_value: 5.0
  early_stopping_patience: 5
  nan_loss_patience: 5
  epochs: 50
  learning_rate: 0.001
  weight_decay: 1.0e-05
  warmup_steps: 100
  # Worker config for 1 GPU + 20 CPUs
  num_workers: 4
  val_workers: 2
  prefetch_factor: 2
  pin_memory: true

  gradient_snapshot_frequency: 100
  gradient_snapshot_top_k: 5
  gradient_vanishing_threshold: 1.0e-8
  gradient_exploding_threshold: 1.0e2
  gradient_debug_log_dir: outputs/grad_debug

  # Temporal split configuration
  split_strategy: "node"
  # train_end_date: "2021-01-31"
  # val_end_date: "2021-03-31"
  # test_end_date omitted - uses all remaining data

  # ignored
  val_split: 0.2
  test_split: 0.1

  profiler:
    # Optimized for minimal overhead (~10% vs 234% with defaults)
    # Duration controlled by: wait_steps + warmup_steps + active_steps = 5+1+2 = 8 batches
    enabled: true
    wait_steps: 5
    warmup_steps: 1
    active_steps: 2
    profile_epochs: [1]
    record_memory: false # Disabled - saves ~15-20% profiler overhead
    log_dir: auto
  plot_forecasts: true
  num_forecast_samples: 3
  # Joint inference loss configuration (lower w_sir for stability)
  loss:
    name: "joint_inference"
    joint:
      w_sir: 0.01
      sir_residual_clip: 100.0
