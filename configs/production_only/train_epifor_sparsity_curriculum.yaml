# Sparsity-based curriculum learning configuration

env: "mn5"
# This configuration demonstrates progressive training from low sparsity (clean data)
# to high sparsity (real-world conditions) using synthetic data with varying
# sparsity levels [0.05, 0.2, 0.4, 0.6, 0.8].
#
# The curriculum sampler filters synthetic runs by sparsity range at each phase,
# enabling the model to first learn dynamics from clean data, then progressively
# adapt to noisier, more realistic conditions.

data:
  dataset_path: data/processed/synthetic_full_holt_damped.zarr
  real_dataset_path: data/processed/real_with_id.zarr
  region2vec_path: outputs/region_embeddings/region_embeddings.pt
  use_valid_targets: true
  mobility_threshold: 10
  missing_permit:
    input:
      biomarkers_joint: 53
      cases: 20
      hospitalizations: 53
      deaths: 20
    horizon:
      biomarkers_joint: 26
      cases: 10
      hospitalizations: 26
      deaths: 10
  window_stride: 7
  sample_ordering: "time"
  log_scale: true
  # run_id is ignored when curriculum is enabled (sampler handles run selection)
  run_id: "0_Baseline"

model:
  strict: false
  type:
    cases: true
    regions: true
    biomarkers: true
    mobility: true
  params:
    mobility_embedding_dim: 32
    region_embedding_dim: 64
    gnn_module: "gcn"
    #-- seq sizes --#
    input_window_length: 60
    forecast_horizon: 28
    #-- graph params --#
    max_neighbors: 20
    gnn_depth: 2
    #-- SIR physics bounds (prevent gradient explosion) --#
    sir_physics:
      dt: 1.0
      enforce_nonnegativity: true
      enforce_mass_conservation: true
      beta_min: 0.01
      beta_max: 2.0
      gamma_min: 0.05
      gamma_max: 0.5
      mortality_min: 0.0001
      mortality_max: 0.05
      residual_clip: 10000.0

output:
  experiment_name: sparsity_curriculum
  log_dir: outputs/training
  wandb_mode: offline
  wandb_tags: [mn5]

training:
  compile: true
  compile_mode: "reduce-overhead"
  compile_dynamic: false
  compile_fullgraph: false
  compile_backward: true
  seed: 42
  device: "cuda"
  batch_size: 32
  shuffle_train_batches: true
  gradient_accumulation_steps: 1
  gradient_clip_value: 5.0
  early_stopping_patience: 5
  nan_loss_patience: 5
  epochs: 50
  learning_rate: 0.001
  weight_decay: 1.0e-05
  warmup_steps: 100
  min_learning_rate: 5.0e-05
  # Worker config for 1 GPU + 20 CPUs
  num_workers: 12
  val_workers: 2
  prefetch_factor: 2
  pin_memory: true

  # Temporal split configuration
  split_strategy: "node"

  val_split: 0.2
  test_split: 0.1

  # Sparsity-based curriculum configuration
  curriculum:
    enabled: true
    # Number of synthetic runs to sample from per epoch
    # 3 is recommended for diversity while maintaining reasonable memory overhead
    active_runs: 3
    # Contiguous windows per run before rotating to next run
    chunk_size: 512
    # How to select runs within sparsity range: "round_robin" or "random"
    run_sampling: "round_robin"

    schedule:
      # Phase 0: Clean synthetic only, using the lowest-sparsity bucket (~0.05).
      - start_epoch: 0
        end_epoch: 10
        synth_ratio: 1.0
        mode: "node_major"
        min_sparsity: 0.0
        max_sparsity: 0.10

      # Phase 1: Add light sparsity while still heavily favoring synthetic data.
      - start_epoch: 10
        end_epoch: 20
        synth_ratio: 0.8
        mode: "node_major"
        min_sparsity: 0.0
        max_sparsity: 0.25

      # Phase 2: Bring in the mid-sparsity bucket (~0.40) before shifting toward real.
      - start_epoch: 20
        end_epoch: 30
        synth_ratio: 0.6
        mode: "node_major"
        min_sparsity: 0.0
        max_sparsity: 0.45

      # Phase 3: Emphasize harder synthetic runs (~0.20-0.60) with mixed real data.
      - start_epoch: 30
        end_epoch: 40
        synth_ratio: 0.4
        mode: "node_major"
        min_sparsity: 0.15
        max_sparsity: 0.65

      # Phase 4: Final real-heavy adaptation with the hardest synthetic buckets.
      - start_epoch: 40
        end_epoch: 50
        synth_ratio: 0.2
        mode: "node_major"
        min_sparsity: 0.35
        max_sparsity: 1.0

  profiler:
    enabled: true
    wait_steps: 5
    warmup_steps: 1
    active_steps: 2
    log_dir: auto
    record_memory: false
    profile_epochs: [1]
  # Joint inference loss configuration (lower w_sir for stability)
  loss:
    name: "joint_inference"
    joint:
      w_sir: 0.01
      sir_residual_clip: 100.0
  plot_forecasts: true
  num_forecast_samples: 3
