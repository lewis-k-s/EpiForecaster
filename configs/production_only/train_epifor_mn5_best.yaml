model:
  type:
    cases: true
    regions: true
    biomarkers: true
    mobility: true
  mobility_embedding_dim: 16
  region_embedding_dim: 64
  input_window_length: 60
  forecast_horizon: 28
  max_neighbors: 20
  biomarkers_dim: 13
  cases_dim: 3
  gnn_depth: 3
  gnn_hidden_dim: 32
  use_population: true
  population_dim: 1
  include_day_of_week: true
  include_holidays: true
  include_lockdown_severity: true
  gnn_module: gat
  forecaster_head: transformer
  strict: false
  head_d_model: 128
  head_n_heads: 4
  head_num_layers: 3
  head_dropout: 0.1
  head_positional_encoding: sinusoidal
  sir_physics:
    dt: 1.0
    enforce_nonnegativity: true
    enforce_mass_conservation: true
    beta_min: 0.01
    beta_max: 2.0
    gamma_min: 0.05
    gamma_max: 0.5
    mortality_min: 0.0001
    mortality_max: 0.05
    residual_clip: 10000.0
  init_weights:
    rezero_init: 0.001
    rate_head_final_gain: 0.01
    initial_state_final_gain: 0.01
    obs_context_final_gain: 0.5
  observation_heads:
    kernel_length_ww: 14
    kernel_length_hosp: 21
    kernel_length_cases: 14
    kernel_length_deaths: 21
    learnable_kernel_ww: false
    learnable_kernel_hosp: false
    learnable_kernel_cases: true
    learnable_kernel_deaths: true
    learnable_scale_ww: true
    learnable_scale_hosp: true
    learnable_scale_cases: true
    learnable_scale_deaths: true
    residual_mode: additive
    residual_scale: 0.2
    residual_hidden_dim: 32
    residual_layers: 2
    residual_dropout: 0.1
    obs_context_dim: 96
    delta_forecasting: true
    anchor_mode: last_valid_step
  region2vec_path: ''
data:
  dataset_path: data/processed/real_with_id.zarr
  real_dataset_path: ''
  regions_data_path: ''
  region2vec_path: outputs/region_embeddings/region_embeddings.pt
  mobility_threshold: 0.0
  use_valid_targets: true
  window_stride: 7
  missing_permit:
    input:
      biomarkers_joint: 53
      cases: 20
      hospitalizations: 53
      deaths: 20
    horizon:
      biomarkers_joint: 26
      cases: 10
      hospitalizations: 26
      deaths: 10
  sample_ordering: time
  log_scale: true
  mobility_clip_range:
  - -8.0
  - 8.0
  mobility_scale_epsilon: 1.0e-06
  mobility_lags: []
  use_imported_risk: false
  run_id_chunk_size: 1
  run_id: real
training:
  epochs: 50
  seed: 42
  batch_size: 32
  shuffle_train_batches: true
  gradient_accumulation_steps: 1
  max_batches: null
  learning_rate: 0.0017360279618333185
  optimizer: adamw
  weight_decay: 0.00032480462513494467
  resume_checkpoint_path: null
  scheduler_type: cosine
  warmup_steps: 100
  min_learning_rate: 0.0
  gradient_clip_value: 5.0
  early_stopping_patience: 5
  nan_loss_patience: 5
  val_split: 0.2
  test_split: 0.1
  split_strategy: node
  node_split_strategy: random
  node_split_population_bins: 5
  node_split_biomarker_bins: 3
  crossval_enabled: false
  crossval_num_folds: 5
  crossval_fold_index: 0
  crossval_holdout_role: test
  train_end_date: null
  val_end_date: null
  test_end_date: null
  curriculum:
    enabled: false
    active_runs: 1
    chunk_size: 512
    run_sampling: round_robin
    schedule: []
  device: cuda
  num_workers: 4
  val_workers: 2
  test_workers: 0
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true
  eval_frequency: 5
  eval_metrics:
  - mse
  - mae
  - rmse
  loss:
    name: joint_inference
    joint:
      adaptive_scheme: none
      gradnorm_alpha: 1.5
      gradnorm_weight_lr: 0.001
      gradnorm_warmup_steps: 50
      gradnorm_update_every: 16
      gradnorm_ema_decay: 0.9
      gradnorm_probe: obs_context
      gradnorm_min_weight: 0.001
      gradnorm_obs_weight_sum: 0.95
      w_sird_supervision: 0.0
      disable_ww: false
      disable_hosp: false
      disable_cases: false
      disable_deaths: false
      mask_input_ww: false
      mask_input_hosp: false
      mask_input_cases: false
      mask_input_deaths: false
      w_continuity: 0.05
  plot_forecasts: true
  num_forecast_samples: 3
  grad_norm_log_frequency: 500
  progress_log_frequency: 100
  profiler:
    enabled: true
    wait_steps: 5
    warmup_steps: 1
    active_steps: 2
    repeat: 1
    profile_batches: null
    profile_epochs:
    - 1
    log_dir: auto
    record_memory: false
    with_stack: false
  horizon_metric_aggregation: weekly
  enable_tf32: true
  enable_mixed_precision: true
  mixed_precision_dtype: bfloat16
  parameter_dtype: float32
  optimizer_eps: null
  enable_gradient_debug: false
  gradient_debug_log_dir: null
  gradient_snapshot_frequency: 0
  gradient_snapshot_top_k: 5
  gradient_vanishing_threshold: 1.0e-08
  gradient_exploding_threshold: 100.0
  wandb_gradient_histogram_frequency: 0
  wandb_gradient_histogram_max_params: 24
  wandb_gradient_histogram_patterns:
  - backbone.beta_projection
  - backbone.gamma_projection
  - backbone.mortality_projection
  - backbone.initial_states_projection
  - backbone.obs_context_projection
  - ww_head.shedding_conv
  - ww_head.residual_proj
  - hosp_head.residual_proj
  - cases_head.residual_proj
  - deaths_head.residual_proj
  - cases_head.delay_kernel
  - deaths_head.delay_kernel
  compile: true
  compile_mode: reduce-overhead
  compile_fullgraph: false
  compile_dynamic: false
  compile_backward: true
output:
  log_dir: outputs/training
  experiment_name: mn5_epiforecaster
  save_checkpoints: true
  checkpoint_frequency: 10
  save_best_only: true
  write_granular_eval: false
  granular_eval_filename: '{split}_granular.csv'
  wandb_project: epiforecaster
  wandb_entity: null
  wandb_group: null
  wandb_tags:
  - mn5
  wandb_mode: offline
env: mn5
