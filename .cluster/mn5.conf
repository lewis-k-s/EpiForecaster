# Cluster dispatch configuration for MareNostrum 5 + EpiForecaster
#
# Selected via: CLUSTER_CONF=.cluster/mn5.conf cluster_dispatch.sh ...
# Or symlink .cluster/dispatch.conf -> mn5.conf for default selection.

# --- Cluster identity ---
CLUSTER_NAME=mn5
COMPUTE_HOST=mn5
TRANSFER_HOST=dt
REMOTE_BASE=${REMOTE_BASE:-/home/bsc/bsc008913/EpiForecaster}
SLURM_ACCOUNT=bsc08
LOG_DIR=logs
MODULE_SETUP=scripts/cluster/mn5_module_setup.sh

# --- Sync commands (run locally via transfer host) ---
SYNC_UP="bash syncto_mn5.sh"
SYNC_UP_RAW="bash syncto_mn5_raw.sh"
SYNC_DOWN="bash syncback_from_mn5.sh"

# --- Mode registry ---
# Each line: MODE_<name>=<script_path>
MODE_preprocess=scripts/cluster/preprocess.sbatch
MODE_single=scripts/cluster/train_single_gpu.sbatch
MODE_hpsearch=scripts/cluster/hpsearch.sbatch
MODE_missing_permit=scripts/cluster/hpsearch_missing_permit.sbatch
MODE_context_length=scripts/cluster/hpsearch_context_length.sbatch
MODE_ablation=scripts/cluster/ablation.sbatch
MODE_foldval=scripts/cluster/run_fold_validation.sbatch
MODE_crossval=scripts/cluster/submit_crossval.sh
MODE_synth_pretrain=scripts/cluster/submit_synth_pretrain.sh
MODE_pretrain_finetune=scripts/cluster/submit_pretrain_then_finetune.sh
MODE_pretrain_real_eval=scripts/cluster/eval_pretrain_on_real.sbatch

# --- Per-mode resource specs (used by alloc command) ---
# Derived from #SBATCH directives in each .sbatch
RESOURCES_preprocess="--partition=gpp --qos=gp_bscls --cpus-per-task=8 --time=00:15:00"
RESOURCES_single="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=02:00:00"
RESOURCES_hpsearch="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=05:00:00"
RESOURCES_missing_permit="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=05:00:00"
RESOURCES_context_length="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=05:00:00"
RESOURCES_ablation="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=08:00:00"
RESOURCES_foldval="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=04:00:00"
RESOURCES_crossval="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=04:00:00"
RESOURCES_synth_pretrain="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=02:00:00"
RESOURCES_pretrain_finetune="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=08:00:00"
RESOURCES_pretrain_real_eval="--partition=acc --qos=acc_bscls --gres=gpu:1 --cpus-per-task=20 --time=01:00:00"

# --- Shell-dispatch modes (submit invokes the script directly, not via sbatch) ---
# These scripts handle their own sbatch calls internally.
SHELL_MODES="crossval synth_pretrain pretrain_finetune"
